apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-core-gateway-class
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            <CLUSTER_LABEL_KEY>: "<CLUSTER_LABEL_VALUE>"
  template:
    metadata:
      name: "cluster-core-gateway-class-{{name}}"
    spec:
      project: cluster-core
      source:
        repoURL: <SOURCE_REPO_SSH_URL>
        targetRevision: HEAD
        path: kustomize/cluster-core/gateway-class
      destination:
        server: "{{server}}"
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
